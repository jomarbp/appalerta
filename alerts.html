<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Alertas - Sistema de Alertas</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            margin-bottom: 3rem;
            animation: fadeIn 0.6s ease;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--color-text-dim);
            font-size: 1.125rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .form-section {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--color-text);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .alerts-section {
            animation: fadeIn 0.6s ease;
        }

        .alerts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .alerts-count {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            color: var(--color-text);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--color-primary);
            background: rgba(0, 240, 255, 0.1);
            color: var(--color-primary);
        }

        .alerts-list {
            display: grid;
            gap: 1rem;
        }

        .alert-item {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-left: 4px solid;
            border-radius: 12px;
            padding: 1.5rem;
            transition: var(--transition);
            animation: slideIn 0.4s ease;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1.5rem;
            align-items: start;
        }

        .alert-item:hover {
            transform: translateX(8px);
            box-shadow: var(--glow-primary);
        }

        .alert-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        .alert-content {
            flex: 1;
        }

        .alert-header-row {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }

        .alert-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .alert-level-badge {
            display: inline-block;
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-critical {
            background: rgba(255, 51, 102, 0.2);
            color: var(--color-danger);
            border: 1px solid var(--color-danger);
        }

        .badge-high {
            background: rgba(255, 170, 0, 0.2);
            color: var(--color-warning);
            border: 1px solid var(--color-warning);
        }

        .badge-medium {
            background: rgba(255, 170, 0, 0.15);
            color: #ffaa00;
            border: 1px solid #ffaa00;
        }

        .badge-low {
            background: rgba(0, 240, 255, 0.2);
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
        }

        .badge-info {
            background: rgba(123, 47, 247, 0.2);
            color: var(--color-secondary);
            border: 1px solid var(--color-secondary);
        }

        .alert-description {
            color: var(--color-text-dim);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .alert-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: var(--color-text-dim);
            flex-wrap: wrap;
        }

        .alert-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.25rem;
        }

        .btn-delete {
            background: rgba(255, 51, 102, 0.2);
            color: var(--color-danger);
        }

        .btn-delete:hover {
            background: var(--color-danger);
            color: white;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--color-text-dim);
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 1.25rem;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .form-section {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .alert-item {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .alert-actions {
                flex-direction: row;
            }

            .filter-bar {
                overflow-x: auto;
                flex-wrap: nowrap;
            }
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--color-bg-card);
            border: 1px solid var(--color-primary);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            box-shadow: var(--glow-primary);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideInRight 0.4s ease;
            z-index: 1000;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-icon {
            font-size: 1.5rem;
        }

        .toast-message {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">⚡ Sistema de Alertas</div>
        <ul class="navbar-menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="alerts.html" class="active">Alertas</a></li>
        </ul>
        <div class="navbar-user">
            <span id="userName">Admin</span>
            <div class="user-avatar" id="userAvatar">A</div>
            <button class="btn btn-danger" onclick="logout()" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Salir</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Gestión de Alertas</h1>
            <p class="page-subtitle">Crea, monitorea y gestiona alertas de peligro en tiempo real</p>
        </div>

        <div class="content-grid">
            <div class="form-section">
                <div class="card fade-in">
                    <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem;">➕ Nueva Alerta</h2>
                    <form id="alertForm">
                        <div class="form-group">
                            <label for="alertTitle">Título</label>
                            <input type="text" id="alertTitle" placeholder="Ej: Fuga de gas detectada" required>
                        </div>

                        <div class="form-group">
                            <label for="alertDescription">Descripción</label>
                            <textarea id="alertDescription" placeholder="Describe los detalles de la alerta..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="alertLevel">Nivel de Peligro</label>
                            <select id="alertLevel" required>
                                <option value="">Selecciona un nivel</option>
                                <option value="critical">🔴 Crítico</option>
                                <option value="high">🟠 Alto</option>
                                <option value="medium">🟡 Medio</option>
                                <option value="low">🔵 Bajo</option>
                                <option value="info">🟣 Informativo</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="alertLocation">Ubicación</label>
                            <input type="text" id="alertLocation" placeholder="Ej: Edificio A, Piso 3" required>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            Crear Alerta
                        </button>
                    </form>
                </div>
            </div>

            <div class="alerts-section">
                <div class="card">
                    <div class="alerts-header">
                        <h2 style="font-size: 1.5rem;">Alertas Activas</h2>
                        <span class="alerts-count" id="alertsCount">0 alertas</span>
                    </div>

                    <div class="filter-bar">
                        <button class="filter-btn active" data-filter="all">Todas</button>
                        <button class="filter-btn" data-filter="critical">🔴 Críticas</button>
                        <button class="filter-btn" data-filter="high">🟠 Altas</button>
                        <button class="filter-btn" data-filter="medium">🟡 Medias</button>
                        <button class="filter-btn" data-filter="low">🔵 Bajas</button>
                        <button class="filter-btn" data-filter="info">🟣 Info</button>
                    </div>

                    <div class="alerts-list" id="alertsList">
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p class="empty-state-text">No hay alertas activas</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Verificar autenticación
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // Mostrar nombre de usuario
        const username = localStorage.getItem('username') || 'Admin';
        document.getElementById('userName').textContent = username;
        document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            window.location.href = 'index.html';
        }

        class AlertManager {
            constructor() {
                this.alerts = this.loadAlerts();
                this.currentFilter = 'all';
                this.form = document.getElementById('alertForm');
                this.alertsList = document.getElementById('alertsList');
                this.alertsCount = document.getElementById('alertsCount');
                
                this.init();
            }

            init() {
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
                this.setupFilters();
                this.renderAlerts();
            }

            loadAlerts() {
                const stored = localStorage.getItem('alerts');
                return stored ? JSON.parse(stored) : [];
            }

            saveAlerts() {
                localStorage.setItem('alerts', JSON.stringify(this.alerts));
            }

            handleSubmit(e) {
                e.preventDefault();

                const alert = {
                    id: Date.now(),
                    title: document.getElementById('alertTitle').value,
                    description: document.getElementById('alertDescription').value,
                    level: document.getElementById('alertLevel').value,
                    location: document.getElementById('alertLocation').value,
                    timestamp: new Date().toLocaleString('es-ES')
                };

                this.alerts.unshift(alert);
                this.saveAlerts();
                this.renderAlerts();
                this.form.reset();
                this.showToast('✓ Alerta creada exitosamente');
            }

            deleteAlert(id) {
                this.alerts = this.alerts.filter(alert => alert.id !== id);
                this.saveAlerts();
                this.renderAlerts();
                this.showToast('🗑️ Alerta eliminada');
            }

            setupFilters() {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentFilter = btn.dataset.filter;
                        this.renderAlerts();
                    });
                });
            }

            getFilteredAlerts() {
                if (this.currentFilter === 'all') {
                    return this.alerts;
                }
                return this.alerts.filter(alert => alert.level === this.currentFilter);
            }

            getIcon(level) {
                const icons = {
                    critical: '🔴',
                    high: '🟠',
                    medium: '🟡',
                    low: '🔵',
                    info: '🟣'
                };
                return icons[level] || '⚠️';
            }

            getLevelText(level) {
                const texts = {
                    critical: 'Crítico',
                    high: 'Alto',
                    medium: 'Medio',
                    low: 'Bajo',
                    info: 'Info'
                };
                return texts[level] || level;
            }

            getIconBg(level) {
                const colors = {
                    critical: 'rgba(255, 51, 102, 0.2)',
                    high: 'rgba(255, 170, 0, 0.2)',
                    medium: 'rgba(255, 170, 0, 0.15)',
                    low: 'rgba(0, 240, 255, 0.2)',
                    info: 'rgba(123, 47, 247, 0.2)'
                };
                return colors[level];
            }

            renderAlerts() {
                const filteredAlerts = this.getFilteredAlerts();
                this.alertsCount.textContent = `${filteredAlerts.length} ${filteredAlerts.length === 1 ? 'alerta' : 'alertas'}`;

                if (filteredAlerts.length === 0) {
                    this.alertsList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p class="empty-state-text">No hay alertas ${this.currentFilter !== 'all' ? 'de este tipo' : 'activas'}</p>
                        </div>
                    `;
                    return;
                }

                this.alertsList.innerHTML = filteredAlerts.map(alert => `
                    <div class="alert-item alert-${alert.level}">
                        <div class="alert-icon" style="background: ${this.getIconBg(alert.level)}; color: var(--color-${alert.level === 'critical' ? 'danger' : alert.level === 'high' || alert.level === 'medium' ? 'warning' : alert.level === 'low' ? 'primary' : 'secondary'});">
                            ${this.getIcon(alert.level)}
                        </div>
                        <div class="alert-content">
                            <div class="alert-header-row">
                                <div>
                                    <h3 class="alert-title">${alert.title}</h3>
                                    <span class="alert-level-badge badge-${alert.level}">${this.getLevelText(alert.level)}</span>
                                </div>
                            </div>
                            <p class="alert-description">${alert.description}</p>
                            <div class="alert-meta">
                                <span class="alert-meta-item">📍 ${alert.location}</span>
                                <span class="alert-meta-item">🕐 ${alert.timestamp}</span>
                                <span class="alert-meta-item">🆔 #${alert.id}</span>
                            </div>
                        </div>
                        <div class="alert-actions">
                            <button class="btn-icon btn-delete" onclick="alertManager.deleteAlert(${alert.id})" title="Eliminar alerta">
                                🗑️
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `
                    <span class="toast-icon">✓</span>
                    <span class="toast-message">${message}</span>
                `;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'slideInRight 0.4s ease reverse';
                    setTimeout(() => toast.remove(), 400);
                }, 3000);
            }
        }

        const alertManager = new AlertManager();
    </script>
</body>
</html>
